[build]
  base = "agent/web/chat"
  publish = "."
  command = '''node -e 'const fs = require("fs"); const raw = process.env.BRIDGE_BASE_URL || "https://pa-markus.34-217-65-114.sslip.io"; const baseUrl = raw.replace(/\/+$/, ""); fs.writeFileSync("config.js", `// Deployment config for the OpenClaw chat front-end.\n// Generated by netlify.toml from BRIDGE_BASE_URL at build time.\n// Defaults to the pa-markus EC2 bridge; override with the BRIDGE_BASE_URL env var.\nwindow.OPENCLAW_CONFIG = {\n  baseUrl: ${JSON.stringify(baseUrl)},\n};\n`); console.log(`config.js baseUrl=${baseUrl || "(same-origin)"}`);' '''
