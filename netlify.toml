[build]
  base = "agent/web/chat"
  publish = "."
  command = '''node -e 'const fs = require("fs"); const raw = process.env.BRIDGE_BASE_URL || ""; const baseUrl = raw.replace(/\/+$/, ""); fs.writeFileSync("config.js", `// Deployment config for the OpenClaw chat front-end.\n// Generated by netlify.toml from BRIDGE_BASE_URL at build time.\n// Empty baseUrl means same-origin bridge; Netlify deploys should set BRIDGE_BASE_URL.\nwindow.OPENCLAW_CONFIG = {\n  baseUrl: ${JSON.stringify(baseUrl)},\n};\n`); console.log(`config.js baseUrl=${baseUrl || "(same-origin)"}`);' '''
